<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extractor de Datos PDF - Gobernación</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-10">
    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden">
        <div class="bg-blue-900 p-6 text-white text-center">
            <h1 class="text-3xl font-bold">Procesador Masivo de PDFs</h1>
            <p class="text-blue-200 mt-2">Extrae datos y guarda en Google Sheets (Máx. 50 archivos)</p>
        </div>

        <div class="p-8">
            <div id="drop-zone" class="border-4 border-dashed border-blue-200 rounded-xl p-12 text-center hover:bg-blue-50 transition-all cursor-pointer">
                <div class="flex flex-col items-center">
                    <svg class="w-16 h-16 text-blue-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p class="text-xl text-gray-600 font-semibold">Arrastra aquí tus archivos PDF</p>
                    <p class="text-gray-400 text-sm mt-2">Puedes seleccionar hasta 50 archivos a la vez</p>
                </div>
                <input type="file" id="file-input" class="hidden" multiple accept="application/pdf">
            </div>

            <div id="results-container" class="mt-10 hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800">Datos Extraídos</h2>
                    <span id="counter" class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-bold">0 archivos</span>
                </div>
                <div class="overflow-x-auto border rounded-lg">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">SADE</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Resolución</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Beneficiario</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tipo</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="bg-white divide-y divide-gray-200">
                            </tbody>
                    </table>
                </div>
                <button id="send-btn" class="mt-6 w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex justify-center items-center gap-2">
                    <span>Enviar todo a Google Sheets</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const WEB_APP_URL = "AQUÍ_PEGA_TU_URL_DE_APPS_SCRIPT"; 
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.worker.min.js';

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const tableBody = document.getElementById('table-body');
        const resultsContainer = document.getElementById('results-container');
        let extractedData = [];

        // Abrir selector de archivos al hacer clic
        dropZone.onclick = () => fileInput.click();

        // Manejar archivos seleccionados
        fileInput.onchange = (e) => handleFiles(e.target.files);

        // Manejar arrastre
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('bg-blue-50'); };
        dropZone.ondragleave = () => dropZone.classList.remove('bg-blue-50');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-blue-50');
            handleFiles(e.dataTransfer.files);
        };

        async function handleFiles(files) {
            resultsContainer.classList.remove('hidden');
            tableBody.innerHTML = '<tr><td colspan="4" class="p-4 text-center">Procesando...</td></tr>';
            extractedData = [];

            for (let file of files) {
                if (file.type !== 'application/pdf') continue;
                
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                const page = await pdf.getPage(1);
                const textContent = await page.getTextContent();
                const text = textContent.items.map(s => s.str).join(' ');

                // Lógica de extracción (Regex)
                const sade = text.match(/SADE:?\s*(\d+)/i)?.[1] || "No hallado";
                const res = text.match(/RESOLUCION N°? ([\d.-]+)/i)?.[1] || "No hallada";
                const beneficiario = text.match(/señor\(a\)\s+([A-Z\s]+?)\s+con/i)?.[1] || "No hallado";
                const tipo = text.includes("TRASLADO") ? "TRASLADO" : "RESOLUCION";

                const obj = { sade, resolucion: res, beneficiario, tipoDocumento: tipo };
                extractedData.push(obj);
            }
            renderTable();
        }

        function renderTable() {
            tableBody.innerHTML = '';
            document.getElementById('counter').innerText = `${extractedData.length} archivos`;
            extractedData.forEach(item => {
                tableBody.innerHTML += `
                    <tr>
                        <td class="px-4 py-2 border-b text-sm">${item.sade}</td>
                        <td class="px-4 py-2 border-b text-sm">${item.resolucion}</td>
                        <td class="px-4 py-2 border-b text-sm">${item.beneficiario}</td>
                        <td class="px-4 py-2 border-b text-sm font-bold text-blue-600">${item.tipoDocumento}</td>
                    </tr>`;
            });
        }

        document.getElementById('send-btn').onclick = async function() {
            this.innerText = "Enviando... por favor espera";
            this.disabled = true;

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Importante para Apps Script
                    body: JSON.stringify({ registros: extractedData })
                });
                alert("¡Datos enviados con éxito a Google Sheets!");
                location.reload();
            } catch (err) {
                alert("Error al enviar: " + err.message);
                this.disabled = false;
            }
        };
    </script>
</body>
</html>
