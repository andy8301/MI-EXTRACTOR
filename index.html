<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA GOBERNACIÓN — VERSIÓN FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; font-size: 13px; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .drop-zone { border: 3px dashed #1a73e8; padding: 50px; text-align: center; color: #1a73e8; cursor: pointer; background: #e8f0fe; border-radius: 10px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1a73e8; color: white; padding: 10px; border: 1px solid #ddd; }
        td { padding: 10px; border: 1px solid #ddd; text-align: center; font-weight: 500; }
        .debug-area { margin-top: 20px; padding: 15px; background: #202124; color: #00ff00; border-radius: 5px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 11px; }
        .btn { background: #1e8e3e; color: white; border: none; padding: 15px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 15px; }
        .na { color: #d93025; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color: #1a73e8;">EXTRACTOR GOBERNACIÓN - MODO ROBUSTO</h2>
    
    <div class="drop-zone" id="drop-zone">
        📂 ARRASTRE EL PDF AQUÍ (PRUEBE CON EL DE CARLOS VALENCIA)
        <input type="file" id="file-input" style="display:none" accept="application/pdf">
    </div>

    <table>
        <thead>
            <tr>
                <th>SADE INGRESO</th>
                <th>EXPEDIENTE</th>
                <th>ACTO Y SADE</th>
                <th>IDENTIFICACIÓN</th>
                <th>CONTRIBUYENTE</th>
            </tr>
        </thead>
        <tbody id="resultado"></tbody>
    </table>

    <button class="btn" id="btn-enviar">🚀 ENVIAR AL EXCEL</button>

    <div class="debug-area" id="debug">
        --- CONSOLA DE LECTURA ---<br>
        Aquí verás lo que el código "escucha" del PDF. Si esto se queda vacío, el PDF es una imagen.
    </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxS53IBTfAbkhcgoHkea9Po7M9rBVnjkmXTkVl1PpLCvHpmT4EuhxuRz_wqxITuQgLKVg/exec";
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let datosFinales = [];

document.getElementById('drop-zone').onclick = () => document.getElementById('file-input').click();
document.getElementById('file-input').onchange = (e) => leerPDF(e.target.files[0]);

async function leerPDF(file) {
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
    let textoGlobal = "";

    for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        textoGlobal += content.items.map(s => s.str).join(' ') + " ";
    }

    // Limpieza de texto
    const t = textoGlobal.replace(/\s+/g, ' ').trim();
    document.getElementById('debug').innerText = t || "⚠️ ERROR: PDF SIN CAPA DE TEXTO (ES UNA IMAGEN)";

    if (t) {
        const sades = t.match(/\d{10}/g) || [];
        const ids = t.match(/\b\d{2,3}(\.\d{3}){2}\b|\b\d{7,10}\b/g) || []; // Busca cédulas con o sin puntos
        
        // Buscamos el nombre del contribuyente (K)
        // Buscamos texto en mayúsculas después de palabras clave
        const nombreMatch = t.match(/(?:SOLICITANTE|CONTRIBUYENTE)[:\s]+([A-ZÑ\s]{10,60})/i);

        const info = {
            a: sades[1] || sades[0] || "N/A",
            d: t.match(/EXPEDIENTE[:\s]+([\d.-]{5,})/i)?.[1] || "N/A",
            g: "RESOLUCION " + (t.match(/-(\d{4})\b/)?.[1] || "0000") + " - SADE " + (sades[0] || "0000"),
            j: ids.find(id => id.length > 6) || "N/A",
            k: nombreMatch ? nombreMatch[1].trim() : "N/A",
            // Datos fijos para que no falte nada al enviar
            b: 1, c: "", e: "RESOLUCION", f: "NOTIFICACIONES", h: "2026", i: "N/A", l: "CORREO", m: "CALI", n: "NOTIFICACION", o: "2026", p: "YOHANA ESTRADA"
        };

        datosFinales = [info];
        document.getElementById('resultado').innerHTML = `
            <tr>
                <td>${info.a}</td><td>${info.d}</td><td>${info.g}</td><td>${info.j}</td><td>${info.k}</td>
            </tr>`;
    }
}

document.getElementById('btn-enviar').onclick = async () => {
    await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ registros: datosFinales }) });
    alert("Proceso completado.");
};
</script>
</body>
</html>
